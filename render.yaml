# Render Blueprint for the Construction Monitoring backend.
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# Then set the two secret env vars below (DATABASE_URL, CLOUDINARY_URL).
services:
  - type: web
    name: construction-monitoring
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: DATABASE_URL
        sync: false # paste your Neon Postgres connection string in the dashboard
      - key: CLOUDINARY_URL
        sync: false # optional: paste your Cloudinary URL to persist photo uploads
